services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    image: prin7r/landing-pages-on-demand:latest
    container_name: landing-pages-on-demand
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing-pages-on-demand.rule=Host(`landing-pages-on-demand.prin7r.com`)"
      - "traefik.http.routers.landing-pages-on-demand.entrypoints=websecure"
      - "traefik.http.routers.landing-pages-on-demand.tls.certresolver=letsencrypt"
      - "traefik.http.services.landing-pages-on-demand.loadbalancer.server.port=3000"

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: prin7r/drophouse-server:latest
    container_name: drophouse-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=4000
      - DB_PATH=/app/data/app.sqlite
    volumes:
      - ./data:/app/data
    expose:
      - "4000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drophouse-api.rule=Host(`api.drophouse.com`) || (Host(`landing-pages-on-demand.prin7r.com`) && PathPrefix(`/api`))"
      - "traefik.http.routers.drophouse-api.entrypoints=websecure"
      - "traefik.http.routers.drophouse-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.drophouse-api.loadbalancer.server.port=4000"

  queue:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: prin7r/drophouse-server:latest
    container_name: drophouse-queue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/app.sqlite
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["node", "server/src/queue-processor.js"]

  renewal:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: prin7r/drophouse-server:latest
    container_name: drophouse-renewal
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/app.sqlite
    volumes:
      - ./data:/app/data
    # Run renewal check daily at 08:00 UTC via a simple sleep-loop (cron-free)
    # Each iteration: process renewals, then sleep 24h
    command:
      - sh
      - -c
      - |
        while true; do
          echo "[renewal-cron] Running renewal processor at $$(date -Iseconds)"
          node server/src/renewal-processor.js
          echo "[renewal-cron] Sleeping 24h..."
          sleep 86400
        done

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: prin7r/drophouse-app:latest
    container_name: drophouse-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.drophouse-app.rule=Host(`drophouse.prin7r-app.com`)"
      - "traefik.http.routers.drophouse-app.entrypoints=websecure"
      - "traefik.http.routers.drophouse-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.drophouse-app.loadbalancer.server.port=3001"
